<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Claim Item</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        .container {
            background: #fff;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0px 6px 15px rgba(0,0,0,0.1);
            width: 450px;
            margin: 60px auto;
        }

        h2 {
            text-align: center;
            color: indigo;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #333;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
        }

        input[type="file"] {
            padding: 8px;
        }

        textarea {
            resize: vertical;
        }

        button {
            width: 100%;
            margin-top: 25px;
            padding: 14px;
            background: indigo;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #4b0082;
        }

        .back-link {
            margin-top: 15px;
            text-align: center;
        }

        .back-link a {
            color: indigo;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>

</head>
<body>

    <div class="container">
        <h2>Claim Item</h2>

        <!-- IMPORTANT: enctype for file upload -->
        <form action="#" method="post" enctype="multipart/form-data">

            <label>Item Name:</label>
            <input type="text" name="itemName" readonly placeholder="Auto-filled from selected item">

            <label>Claim Date:</label>
            <input type="date" name="claimDate" required>

            <!-- NEW: Upload Photo -->
            <label>Upload Proof (Photo):</label>
            <input type="file" name="proofImage" accept="image/*" required>

            <!-- NEW: Description -->
            <label>Proof Description:</label>
            <textarea name="proofDesc" rows="5" placeholder="Explain why this item belongs to you (e.g. unique marks, contents, receipt, etc.)" required></textarea>

            <button type="submit">Submit Claim</button>

        </form>

        <div class="back-link">
            <a href="view_lost.html">← Back to Notices</a>
        </div>
    </div>

</body>
</html>
