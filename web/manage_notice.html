<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E-Lost: Lost & Found Reports</title>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        header {
            background: indigo;
            color: white;
            padding: 25px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 28px;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 6px 15px rgba(0,0,0,0.1);
        }

        h2 {
            color: indigo;
            text-align: center;
            margin-bottom: 25px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background: indigo;
            color: white;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        .action-btn {
            padding: 6px 12px;
            margin: 2px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }

        .view-btn {
            background: #007bff;
            color: white;
        }

        .archive-btn {
            background: #ffc107;
            color: black;
        }

        .delete-btn {
            background: #dc3545;
            color: white;
        }

        .status {
            font-weight: bold;
        }

        .status-matched {
            color: #6f42c1;
        }

        .status-claimed {
            color: #28a745;
        }

        .status-pending {
            color: #ffc107;
        }

        .status-verified {
            color: #007bff;
        }

        .search-bar {
            text-align: right;
            margin-bottom: 15px;
        }

        .search-bar input {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .search-bar button {
            padding: 8px 12px;
            background: indigo;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .search-bar button:hover {
            background: #4b0082;
        }
    </style>
</head>

<body>

<header>
    <h1>Manage All Reports</h1>
</header>

<div class="container">

    <h2>Lost & Found Reports</h2>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search by item or student...">
        <button>Search</button>
    </div>

    <table id="reportTable">

        <thead>
            <tr>
                <th>Report ID</th>
                <th>Type</th>
                <th>Item</th>
                <th>Location</th>
                <th>Student</th>
                <th>Report Date</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>

            <tr>
                <td>LR001</td>
                <td>Lost</td>
                <td>Laptop</td>
                <td>Library</td>
                <td>Alyaa</td>
                <td>01/06/2026</td>
                <td class="status status-matched">Matched</td>
                <td>
                    <button class="action-btn view-btn">View</button>
                    <button class="action-btn archive-btn">Archive</button>
                    <button class="action-btn delete-btn">Delete</button>
                </td>
            </tr>

            <tr>
                <td>FR001</td>
                <td>Found</td>
                <td>Wallet</td>
                <td>Cafeteria</td>
                <td>Aiman</td>
                <td>01/06/2026</td>
                <td class="status status-claimed">Claimed</td>
                <td>
                    <button class="action-btn view-btn">View</button>
                    <button class="action-btn archive-btn">Archive</button>
                    <button class="action-btn delete-btn">Delete</button>
                </td>
            </tr>

        </tbody>

    </table>

</div>

</body>
</html>
